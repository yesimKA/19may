<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Image Tracking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
  >

    <a-assets>
      <!-- Video -->
      <video id="video1" src="video1.mp4" preload="auto" loop muted playsinline></video>

      <!-- Image (istersen fallback olarak kullanırsın) -->
      <img id="resim1" src="resim1.png">
    </a-assets>

    <!-- Kamera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target (index 0 = targets.mind içindeki ilk görsel) -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Video plane -->
      <a-video
        src="#video1"
        width="1"
        height="0.5625"
        position="0 0 0"
        rotation="0 0 0"
      ></a-video>

    </a-entity>

  </a-scene>

  <script>
    const video = document.querySelector("#video1");

    // Target bulunduğunda videoyu oynat
    document.querySelector('[mindar-image-target]').addEventListener("targetFound", () => {
      video.play();
    });

    // Target kaybolduğunda videoyu durdur
    document.querySelector('[mindar-image-target]').addEventListener("targetLost", () => {
      video.pause();
    });
  </script>

</body>
</html>

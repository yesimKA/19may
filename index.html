<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>19 Mayıs AR Deneyimi</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body, html { 
      margin: 0; padding: 0; width: 100%; height: 100%; 
      overflow: hidden; touch-action: none; background-color: #000; 
    }
    
    /* iOS Safari renderını durdurmasın diye display:none yerine ekran dışına itiyoruz */
    #tekVideo { 
      position: absolute;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0.01;
      pointer-events: none;
      z-index: -100;
    }
    
    #ar-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); color: white; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; font-family: sans-serif;
    }
    
    #start-button {
      padding: 18px 45px; font-size: 22px; background: #cc0000;
      color: white; border: none; border-radius: 50px; cursor: pointer;
      font-weight: bold; box-shadow: 0 4px 15px rgba(204,0,0,0.4);
      transition: transform 0.2s;
    }
    
    #start-button:active { 
      transform: scale(0.95); 
    }
    
    .instruction { 
      margin-top: 20px; font-size: 16px; text-align: center; 
      padding: 0 20px; line-height: 1.5; 
    }
  </style>
</head>

<body>

  <script>
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    // GitHub, Instagram, Facebook, LinkedIn, Twitter vb. tarayıcıları tespit eder
    var isInAppBrowser = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || 
                         (ua.indexOf("Instagram") > -1) || (ua.indexOf("LinkedIn") > -1) || 
                         (ua.indexOf("Twitter") > -1) || (ua.indexOf("GitHub") > -1);

    if (isInAppBrowser) {
      alert("AR deneyimini tam olarak yaşayabilmek ve kameraya erişebilmek için lütfen bu linki cihazınızın kendi tarayıcısında (Safari veya Chrome) açın. Menüden 'Tarayıcıda Aç' (Open in Browser) seçeneğini kullanabilirsiniz.");
    }
  </script>

  <div id="ar-overlay">
    <button id="start-button">DENEYİMİ BAŞLAT</button>
    <p class="instruction">Kameraya izin verin ve görseli taratın.<br><b>iOS kullanıcıları:</b> Sessiz modu kapatmayı unutmayın.</p>
  </div>

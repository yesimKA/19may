<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>WebAR Image Tracking</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      /* Mobil ve Web'de arka planda fazladan video oynatıcı çıkmasını kesin olarak engeller */
      #ar-video {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; autoStart: true;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="video1.mp4" playsinline webkit-playsinline muted loop crossorigin="anonymous"></video>
        <img id="ar-image" src="resim1.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-video 
          src="#ar-video" 
          width="1" 
          height="1.41" 
          position="0 0 0" 
          rotation="0 0 0">
        </a-video>
      </a-entity>

    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const target = document.querySelector('#target');
        const video = document.querySelector('#ar-video');

        // Kamera resmi algıladığında videoyu başlat
        target.addEventListener("targetFound", event => {
          video.play();
        });

        // Kamera resimden uzaklaştığında/kaybettiğinde videoyu durdur
        target.addEventListener("targetLost", event => {
          video.pause();
        });
      });
    </script>
  </body>
</html>

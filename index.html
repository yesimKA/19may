<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>19 Mayıs AR Deneyimi</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; touch-action: none; }
    #ar-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); color: white; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; font-family: sans-serif;
    }
    #start-button {
      padding: 18px 45px; font-size: 22px; background: #cc0000;
      color: white; border: none; border-radius: 50px; cursor: pointer;
      font-weight: bold; box-shadow: 0 4px 15px rgba(204,0,0,0.4);
    }
    .instruction { margin-top: 20px; font-size: 16px; text-align: center; padding: 0 20px; }
  </style>
</head>

<body>

  <div id="ar-overlay">
    <button id="start-button">DENEYİMİ BAŞLAT</button>
    <p class="instruction">Kameraya izin verin ve görseli taratın.<br><b>iOS kullanıcıları:</b> Sessiz modu kapatmayı unutmayın.</p>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: true">

    <a-assets>
      <video id="tekVideo" 
             src="./video1.mp4" 
             preload="auto" 
             loop="true" 
             playsinline 
             webkit-playsinline 
             crossorigin="anonymous">
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="targetEntity">
      <a-video 
        src="#tekVideo" 
        width="1" 
        height="1.41" 
        position="0 0 0" 
        rotation="0 0 0">
      </a-video>
    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const video = document.querySelector('#tekVideo');
    const startButton = document.querySelector('#start-button');
    const overlay = document.querySelector('#ar-overlay');
    const targetEntity = document.querySelector('#targetEntity');

    startButton.addEventListener('click', () => {
      // 1. Arayüzü temizle
      overlay.style.display = 'none';

      // 2. iOS Video Unlock (Kritik Adım)
      // Videoyu sessiz başlatıp hemen durduruyoruz, bu sayede tarayıcı videoyu "güvenli" sayıyor.
      video.muted = true;
      video.play().then(() => {
        video.pause();
        video.muted = false; // Kullanıcı tıkladığı için ses artık açılabilir
      }).catch(err => {
        console.log("Video başlatma hatası:", err);
      });

      // 3. AR Sistemini başlat
      if (sceneEl.systems['mindar-image-system']) {
        sceneEl.systems['mindar-image-system'].start();
      }
    });

    // Hedef Bulunduğunda
    targetEntity.addEventListener("targetFound", () => {
      console.log("Görsel yakalandı");
      video.play().catch(e => console.error("Oynatma hatası:", e));
    });

    // Hedef Kaybolduğunda
    targetEntity.addEventListener("targetLost", () => {
      console.log("Görsel kaybedildi");
      video.pause();
    });
  </script>

</body>
</html>

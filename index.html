<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>19 Mayıs AR Deneyimi</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    /* Başlat Butonu Katmanı */
    #ar-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); color: white; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 999; font-family: sans-serif;
    }

    #start-button {
      padding: 15px 40px; font-size: 20px; background: #cc0000;
      color: white; border: none; border-radius: 30px; cursor: pointer;
      font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    #start-button:active { transform: scale(0.95); }
    
    .instruction { margin-top: 15px; font-size: 14px; opacity: 0.8; }
  </style>
</head>

<body>

  <div id="ar-overlay">
    <button id="start-button">DENEYİMİ BAŞLAT</button>
    <p class="instruction">Butona bastıktan sonra kamerayı görsele tutun.</p>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="tekVideo" 
             src="./video1.mp4" 
             preload="auto" 
             loop="true" 
             playsinline 
             webkit-playsinline 
             muted 
             crossorigin="anonymous">
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="targetEntity">
      
      <a-video 
        src="#tekVideo" 
        width="1" 
        height="1.41" 
        position="0 0 0.1" 
        rotation="0 0 0">
      </a-video>

    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const video = document.querySelector('#tekVideo');
    const startButton = document.querySelector('#start-button');
    const overlay = document.querySelector('#ar-overlay');
    const targetEntity = document.querySelector('#targetEntity');

    // 1. "Başlat" butonuna basıldığında AR ve Video sistemini uyandır
    startButton.addEventListener('click', () => {
      overlay.style.display = 'none'; // Arayüzü gizle
      
      // AR sistemini başlat
      sceneEl.systems['mindar-image-system'].start();
      
      // Videoyu bir saniyeliğine oynatıp durdur (Tarayıcı kilidini açar)
      video.play().then(() => {
        video.pause();
        video.muted = false; // Kullanıcı tıkladığı için artık sesli olabilir
      });
    });

    // 2. Hedef görsel bulunduğunda video başlasın
    targetEntity.addEventListener("targetFound", () => {
      console.log("Hedef algılandı!");
      video.play();
    });

    // 3. Hedef görsel kaybolduğunda video dursun
    targetEntity.addEventListener("targetLost", () => {
      console.log("Hedef kayboldu!");
      video.pause();
    });
  </script>

</body>
</html>

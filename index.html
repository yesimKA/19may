<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8">
    <title>Hata Ayıklamalı AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        #debug-log {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(255,0,0,0.8); color: white; padding: 10px;
            z-index: 10000; font-size: 12px; display: none;
        }
    </style>
</head>
<body>

    <div id="debug-log">Hatalar burada görünecek...</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind;" 
        color-space="sRGB" renderer="colorManagement: true" 
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <video id="tekVideo" src="video1.mp4" 
                   preload="auto" playsinline webkit-playsinline muted loop 
                   crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="hedefNesne">
            <a-video src="#tekVideo" width="0.5625" height="1" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#tekVideo');
        const debug = document.querySelector('#debug-log');

        // Video yükleme hatasını yakala
        video.addEventListener('error', (e) => {
            debug.style.display = 'block';
            debug.innerText = "HATA: Video dosyası bulunamadı veya oynatılamıyor! Yolun doğru olduğundan emin ol.";
        });

        // Hedef algılandığında videoyu zorla oynat
        document.querySelector('#hedefNesne').addEventListener("targetFound", () => {
            video.play().catch(err => {
                debug.style.display = 'block';
                debug.innerText = "OYNATMA HATASI: Ekrana bir kez dokunman gerekiyor.";
            });
        });

        // Sayfa tıklandığında sesi aç ve hata kutusunu gizle
        window.addEventListener('click', () => {
            video.muted = false;
            video.play();
            debug.style.display = 'none';
        });
    </script>
</body>
</html>
